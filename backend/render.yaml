# Render.com blueprint for the backend web service.
# After connecting your GitHub repo to Render you can use this file to set up
# the service automatically. The env vars marked sync:false must be entered
# in the Render dashboard so they aren't kept in source control.

services:
  - type: web
    name: hunters-foundit-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
